<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원소사전 · 원소명 → 기호</title>
<style>
  :root{
    --blue:#3182F6;
    --blue-dark:#1B64DA;
    --blue-soft:#EAF2FF;
    --bg:#F5F7FA;
    --card:#FFFFFF;
    --ink:#191F28;
    --sub:#8B95A1;
    --line:#EEF1F4;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }

  .wrap{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:0 20px 32px;
    display:flex;
    flex-direction:column;
  }

  /* header */
  header{
    padding:28px 0 18px;
    position:sticky;
    top:0;
    background:linear-gradient(180deg, var(--bg) 80%, rgba(245,247,250,0));
    z-index:10;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  h1{
    font-size:22px;
    font-weight:800;
    margin:0;
    letter-spacing:-0.3px;
  }
  .title-row .badge{
    font-size:12px;
    font-weight:700;
    color:var(--blue);
    background:var(--blue-soft);
    padding:3px 8px;
    border-radius:8px;
  }
  .sub{
    margin:4px 0 0;
    font-size:13.5px;
    color:var(--sub);
    font-weight:500;
  }

  /* search box */
  .search-box{
    margin-top:18px;
    position:relative;
  }
  .search-box input{
    width:100%;
    height:58px;
    border:none;
    outline:none;
    border-radius:var(--radius);
    background:var(--card);
    font-size:19px;
    font-weight:700;
    padding:0 20px;
    color:var(--ink);
    box-shadow:0 1px 0 rgba(0,0,0,0.04), 0 8px 20px rgba(20,40,90,0.06);
    transition:box-shadow .15s ease;
  }
  .search-box input::placeholder{
    color:#B6BEC8;
    font-weight:600;
  }
  .search-box input:focus{
    box-shadow:0 0 0 2.5px var(--blue), 0 8px 20px rgba(49,130,246,0.18);
  }
  .clear-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    border:none;
    background:#EEF1F4;
    color:#9AA4B0;
    border-radius:50%;
    font-size:16px;
    display:none;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .clear-btn.show{display:flex;}

  /* live result card - appears instantly while typing */
  .result-stage{
    margin-top:14px;
    min-height:6px;
  }

  .match-card{
    background:linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    border-radius:20px;
    padding:22px 22px 20px;
    color:#fff;
    box-shadow:0 14px 30px rgba(49,130,246,0.28);
    animation:popIn .22s cubic-bezier(.2,.9,.25,1.2);
    position:relative;
    overflow:hidden;
  }
  .match-card::after{
    content:"";
    position:absolute;
    right:-30px; top:-30px;
    width:140px; height:140px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .match-symbol{
    font-size:54px;
    font-weight:800;
    line-height:1;
    letter-spacing:-1px;
  }
  .match-name{
    margin-top:6px;
    font-size:16px;
    font-weight:700;
    opacity:.95;
  }
  .match-alt{
    margin-top:2px;
    font-size:13px;
    opacity:.78;
    font-weight:500;
  }
  .match-num{
    position:absolute;
    right:22px;
    top:22px;
    font-size:13px;
    font-weight:700;
    background:rgba(255,255,255,0.18);
    padding:5px 10px;
    border-radius:9px;
  }
  .copy-row{
    margin-top:16px;
    display:flex;
    gap:8px;
  }
  .copy-btn{
    flex:1;
    background:rgba(255,255,255,0.16);
    border:none;
    color:#fff;
    font-size:14px;
    font-weight:700;
    padding:11px 0;
    border-radius:12px;
    cursor:pointer;
  }
  .copy-btn.copied{ background:rgba(255,255,255,0.32); }

  @keyframes popIn{
    from{ opacity:0; transform:translateY(6px) scale(.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* multi-match list when ambiguous */
  .multi-list{
    background:var(--card);
    border-radius:18px;
    box-shadow:0 1px 0 rgba(0,0,0,0.03), 0 8px 18px rgba(20,40,90,0.05);
    overflow:hidden;
    animation:popIn .2s ease;
  }
  .multi-item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
  }
  .multi-item:last-child{border-bottom:none;}
  .multi-item .sym{
    width:46px; height:46px;
    border-radius:12px;
    background:var(--blue-soft);
    color:var(--blue-dark);
    font-weight:800;
    font-size:17px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .multi-item .info b{ font-size:15px; }
  .multi-item .info div{ font-size:12px; color:var(--sub); margin-top:1px; }

  /* empty state */
  .empty-state{
    margin-top:8px;
    background:var(--card);
    border-radius:16px;
    padding:18px;
    text-align:center;
    color:var(--sub);
    font-size:14px;
    font-weight:600;
    box-shadow:0 1px 0 rgba(0,0,0,0.03);
  }

  /* idle hint section */
  .hint-section{
    margin-top:22px;
  }
  .hint-section h2{
    font-size:13px;
    font-weight:800;
    color:var(--sub);
    margin:0 0 10px 2px;
    letter-spacing:.2px;
  }
  .chip-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:9px 13px;
    font-size:13.5px;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
  }
  .chip b{ color:var(--blue); margin-right:4px; }

  footer{
    margin-top:auto;
    padding-top:30px;
    text-align:center;
    font-size:11.5px;
    color:#B6BEC8;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-row">
      <h1>원소사전</h1>
      <span class="badge">118개 전체</span>
    </div>
    <p class="sub">원소 이름을 입력하면 기호가 바로 떠요</p>

    <div class="search-box">

  <footer>탭하면 검색창에 바로 입력돼요</footer>

<script>
const input = document.getElementById('searchInput');
const stage = document.getElementById('resultStage');
const clearBtn = document.getElementById('clearBtn');
const hintSection = document.getElementById('hintSection');
const chipGrid = document.getElementById('chipGrid');

// 자주 헷갈리는 / 이택명 있는 원소 우선 노출
const HINT_NUMS = [9, 11, 14, 19, 24, 25, 29, 32, 35, 41, 42, 53, 57, 73];
function renderChips(){
  chipGrid.innerHTML = '';
  HINT_NUMS.forEach(n=>{
    const el = ELEMENTS.find(e=>e.num===n);
    if(!el) return;
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<b>${el.symbol}</b>${el.name}`;
    chip.onclick = ()=>{ input.value = el.name; input.dispatchEvent(new Event('input')); input.focus(); };
    chipGrid.appendChild(chip);
  });
}
renderChips();

function norm(s){
  return s.replace(/\s+/g,'').toLowerCase();
}

function matchElements(query){
  const q = norm(query);
  if(!q) return [];
  return ELEMENTS.filter(el=>{
    if(norm(el.name).includes(q)) return true;
    if(el.alt && el.alt.some(a=>norm(a).includes(q))) return true;
    if(norm(el.symbol).includes(q) && q.length>=1) return true;
    return false;
  }).sort((a,b)=>{
    // 정확히 시작하는 것 우선
    const aStart = norm(a.name).startsWith(q) || (a.alt||[]).some(x=>norm(x).startsWith(q));
    const bStart = norm(b.name).startsWith(q) || (b.alt||[]).some(x=>norm(x).startsWith(q));
    if(aStart && !bStart) return -1;
    if(!aStart && bStart) return 1;
    return a.num - b.num;
  });
}

function exactMatch(query){
  const q = norm(query);
  return ELEMENTS.find(el=> norm(el.name)===q || (el.alt && el.alt.some(a=>norm(a)===q)) );
}

function render(){
  const val = input.value.trim();
  clearBtn.classList.toggle('show', val.length>0);

  if(!val){
    stage.innerHTML = '';
    hintSection.style.display = 'block';
    return;
  }
  hintSection.style.display = 'none';

  const exact = exactMatch(val);
  if(exact){
    stage.innerHTML = renderMatchCard(exact);
    bindCopyBtn(exact);
    return;
  }

  const matches = matchElements(val);
  if(matches.length === 0){
    stage.innerHTML = `<div class="empty-state">"${escapeHTML(val)}" 와 일치하는 원소가 없어요</div>`;
    return;
  }
  if(matches.length === 1){
    stage.innerHTML = renderMatchCard(matches[0]);
    bindCopyBtn(matches[0]);
    return;
  }
  // 여러 개 후보
  stage.innerHTML = `<div class="multi-list">${matches.slice(0,8).map(el=>`
    <div class="multi-item" data-name="${escapeHTML(el.name)}">
      <div class="sym">${el.symbol}</div>
      <div class="info"><b>${el.name}</b>${el.alt? `<div>${el.alt.join(', ')}</div>`:''}</div>
    </div>
  `).join('')}</div>`;
  document.querySelectorAll('.multi-item').forEach(item=>{
    item.onclick = ()=>{
      input.value = item.dataset.name;
      render();
    };
  });
}

function renderMatchCard(el){
  return `
    <div class="match-card">
      <div class="match-num">${el.num}번</div>
      <div class="match-symbol">${el.symbol}</div>
      <div class="match-name">${el.name}</div>
      ${el.alt ? `<div class="match-alt">${el.alt.join(', ')}로도 불려요</div>` : ''}
      <div class="copy-row">
        <button class="copy-btn" id="copySymbolBtn">기호 복사</button>
      </div>
    </div>
  `;
}

function bindCopyBtn(el){
  const btn = document.getElementById('copySymbolBtn');
  if(!btn) return;
  btn.onclick = async ()=>{
    try{
      await navigator.clipboard.writeText(el.symbol);
      btn.textContent = '복사됨 ✓';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent='기호 복사'; btn.classList.remove('copied'); }, 1200);
    }catch(e){
      btn.textContent = '복사 실패';
    }
  };
}

function escapeHTML(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

input.addEventListener('input', render);
clearBtn.addEventListener('click', ()=>{
  input.value=''; render(); input.focus();
});

render();
</script>
</body>
</html>
